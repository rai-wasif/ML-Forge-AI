<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLForge AI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="shell-sidebar">
        <div class="brand">
          <span class="brand-mark">M</span>
          <div>
            <strong>MLForge AI</strong>
            <span>v1.0</span>
          </div>
        </div>

        <nav class="sidebar-nav" aria-label="Main navigation">
          <button type="button" class="nav-item active" data-view="home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
            Home
          </button>
          <button type="button" class="nav-item" data-view="pipeline">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/><circle cx="12" cy="12" r="9"/></svg>
            ML Pipeline
          </button>
          <button type="button" class="nav-item" data-view="experiments">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
            Experiments
          </button>
          <button type="button" class="nav-item" data-view="assistant">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M9 10c0-2 1.5-3 3-3s3 1 3 2.5c0 1.8-3 2-3 4.5"/><circle cx="12" cy="17" r="0.7"/></svg>
            AI Assistant
          </button>
          <button type="button" class="nav-item" data-view="knowledge">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4H6.5A2.5 2.5 0 0 0 4 6.5v13z"/><path d="M4 19.5V6.5"/></svg>
            Knowledge Base
          </button>
        </nav>

        <div class="service-card" id="serviceCard">
          <span class="service-dot"></span>
          <div>
            <strong>System Status</strong>
            <p id="serviceStatus">Checking services...</p>
          </div>
        </div>
      </aside>

      <section class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="topbarEyebrow">AI / ML Engineering Workbench</p>
            <h1 id="topbarTitle">Welcome</h1>
          </div>
          <div class="status" id="statusText">Ready</div>
        </header>

        <section class="workspace" id="workspace"></section>

        <footer class="app-footer">
          <span>MLForge AI v1.0</span>
          <span>FastAPI</span>
          <span>MLflow</span>
          <span>Qdrant</span>
        </footer>
      </section>
    </main>

    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
